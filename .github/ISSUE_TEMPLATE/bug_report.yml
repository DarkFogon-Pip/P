name: Bug report
description: Report a bug with the Electrolux integration
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, please check the [troubleshooting section](https://github.com/DarkFogon-Pip/P#troubleshooting) in the README.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "e.g. 2026.2.1"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true

  - type: input
    id: appliance
    attributes:
      label: Appliance type and model
      description: e.g. "Washing machine WM, model EWF1408WDL"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what went wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Paste relevant logs from **Settings → System → Logs**.
        Enable debug logging by adding to `configuration.yaml`:
        ```yaml
        logger:
          logs:
            custom_components.electrolux: debug
        ```
      render: text

  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: |
        Attach the diagnostics file from **Settings → Devices & Services → Electrolux → your device → Download diagnostics**.
        Sensitive data is automatically redacted.
      render: json
