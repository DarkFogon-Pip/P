name: Feature request
description: Suggest a new feature or appliance support
labels: ["enhancement"]
body:
  - type: input
    id: appliance
    attributes:
      label: Appliance type and model (if applicable)
      placeholder: "e.g. Hood HD, model EFB90960OX"

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: What would you like to see added or improved?
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: How would you use this feature in your automations or dashboard?
    validations:
      required: true
